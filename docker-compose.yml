name: propfirm

services:
  backend:
    build:
      context: ./backend
      target: development
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [propfirm]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./infra/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks: [propfirm]

  queue-worker:
    build:
      context: ./backend
      target: development
    command: php artisan queue:work redis --sleep=1 --tries=3 --backoff=5
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    networks: [propfirm]

  scheduler:
    build:
      context: ./backend
      target: development
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    networks: [propfirm]

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    networks: [propfirm]

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: propfirm
      POSTGRES_USER: propfirm
      POSTGRES_PASSWORD: secret
    volumes:
      - propfirm_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propfirm"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [propfirm]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - propfirm_redis_data:/data
    networks: [propfirm]

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "8025:8025"
    networks: [propfirm]

networks:
  propfirm:
    driver: bridge

volumes:
  propfirm_pg_data:
  propfirm_redis_data:
